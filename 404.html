<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #64748b;
      --text-tertiary: #94a3b8;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-bg: #eef2ff;
      --border: #e2e8f0;
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.03);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .error-illustration {
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    .error-number {
      font-size: 8rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-tertiary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
    }

    .error-number::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 2px;
    }

    .error-content {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .error-message {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .action-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
    }

    .home-btn:hover {
      border-color: var(--text-secondary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .home-btn:active {
      transform: translateY(0);
    }

    .home-btn svg {
      width: 18px;
      height: 18px;
    }

    .suggestions {
      margin-top: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards 0.6s;
    }

    .suggestions-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .suggestion-links {
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .suggestion-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s ease;
      position: relative;
    }

    .suggestion-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--text-secondary);
      transition: width 0.2s ease;
    }

    .suggestion-links a:hover {
      color: var(--text-primary);
    }

    .suggestion-links a:hover::after {
      width: 100%;
    }

    @media (max-width: 640px) {
      .container {
        padding: 60px 20px;
      }

      .error-number {
        font-size: 6rem;
      }

      .error-title {
        font-size: 1.25rem;
      }

      .suggestion-links {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="error-illustration">
      <div class="error-number">404</div>
    </div>

    <div class="error-content">
      <h1 class="error-title">页面未找到</h1>
      <p class="error-message">
        抱歉，您访问的页面不存在或已被移除。<br>
        让我带您回到首页吧。
      </p>
    </div>

    <div class="action-card">
      <a href="/" class="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        返回首页
      </a>
    </div>

    <div class="suggestions">
      <p class="suggestions-title">您可能想要</p>
      <div class="suggestion-links">
        <a href="/gh-proxy/">使用 GitHub 加速</a>
        <a href="https://github.com/hunshcn/gh-proxy">查看项目</a>
      </div>
    </div>
  </main>
</body>
</html>
