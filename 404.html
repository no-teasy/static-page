<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --fg: #e8e6e3;
      --accent: #ff3c38;
      --accent2: #00f0ff;
      --muted: #4a4a5a;
      --glow-accent: rgba(255, 60, 56, 0.6);
      --glow-cyan: rgba(0, 240, 255, 0.5);
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── 背景网格 ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* ── 渐变光晕 ── */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    .glow-orb.orb1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--glow-accent), transparent 70%);
      top: -10%; left: -10%;
      animation-duration: 10s;
    }
    .glow-orb.orb2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, var(--glow-cyan), transparent 70%);
      bottom: -10%; right: -10%;
      animation-duration: 12s;
      animation-delay: -4s;
    }
    .glow-orb.orb3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(160, 60, 255, 0.3), transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 9s;
      animation-delay: -2s;
    }

    @keyframes orbFloat {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.15); }
    }

    /* ── 噪点纹理 ── */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* ── 扫描线 ── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
    }

    /* ── 主内容 ── */
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }

    /* ── 标签 ── */
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(255, 60, 56, 0.3);
      padding: 0.4em 1.2em;
      border-radius: 100px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease forwards 0.3s;
      backdrop-filter: blur(4px);
      background: rgba(255, 60, 56, 0.05);
    }

    /* ── 404 大字 ── */
    .error-code {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(6rem, 20vw, 16rem);
      line-height: 1;
      letter-spacing: -0.04em;
      position: relative;
      opacity: 0;
      animation: titleReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.6s;
      background: linear-gradient(135deg, var(--accent) 0%, #ff8c42 40%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: titleReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.6s,
                 gradientShift 4s ease-in-out infinite alternate 1.8s;
      filter: drop-shadow(0 0 60px var(--glow-accent));
      user-select: none;
    }

    /* ── 故障效果 ── */
    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, #ff8c42 40%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-code::before {
      animation: glitch1 3s infinite;
      clip-path: inset(0 0 65% 0);
    }

    .error-code::after {
      animation: glitch2 3s infinite;
      clip-path: inset(65% 0 0 0);
    }

    @keyframes glitch1 {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-4px, -2px); }
      94% { transform: translate(4px, 2px); }
      96% { transform: translate(-2px, 1px); }
    }

    @keyframes glitch2 {
      0%, 90%, 100% { transform: translate(0); }
      91% { transform: translate(3px, 1px); }
      93% { transform: translate(-3px, -1px); }
      95% { transform: translate(2px, -2px); }
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* ── 装饰线 ── */
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 2rem auto;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease forwards 1.2s;
      border-radius: 2px;
    }

    /* ── 描述文字 ── */
    .message {
      font-size: clamp(0.85rem, 1.5vw, 1.05rem);
      color: var(--muted);
      letter-spacing: 0.08em;
      line-height: 1.8;
      max-width: 440px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease forwards 1.5s;
    }

    .message .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent2);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* ── 返回按钮 ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 2.5rem;
      padding: 0.75em 2em;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease forwards 1.8s;
      cursor: pointer;
    }

    .back-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(0, 240, 255, 0.06);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
      transform: translateY(-2px);
    }

    .back-btn:active {
      transform: translateY(0);
    }

    .back-btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .back-btn:hover svg {
      transform: translateX(-3px);
    }

    /* ── 底部状态 ── */
    .footer-info {
      margin-top: 3rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease forwards 2.1s;
    }

    .footer-info .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    .footer-info span {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.3); }
    }

    /* ── 动画关键帧 ── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes titleReveal {
      from { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(10px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* ── 粒子 ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--fg);
      opacity: 0;
      animation: particleDrift linear infinite;
    }

    @keyframes particleDrift {
      0%   { opacity: 0; transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* ── 鼠标跟随光标 ── */
    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,60,56,0.08), transparent 70%);
      pointer-events: none;
      z-index: 1;
      transform: translate(-50%, -50%);
      transition: left 0.3s ease, top 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- 背景层 -->
  <div class="grid-bg"></div>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>
  <div class="glow-orb orb3"></div>
  <div class="noise"></div>
  <div class="scanlines"></div>
  <div class="particles" id="particles"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- 主内容 -->
  <main class="container">
    <div class="tag">// error: page not found</div>
    <h1 class="error-code">404</h1>
    <div class="divider"></div>
    <p class="message">
      <span id="typewriter"></span><span class="cursor"></span>
    </p>
    <a href="/" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/>
        <path d="M12 19l-7-7 7-7"/>
      </svg>
      返回首页
    </a>
    <div class="footer-info">
      <span>HTTP 404</span>
      <div class="dot"></div>
      <span>Not Found</span>
    </div>
  </main>

  <script>
    // ── 打字机效果 ──
    const text = '你寻找的页面已迷失在数字虚空中...';
    const el = document.getElementById('typewriter');
    let i = 0;
    function type() {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        i++;
        setTimeout(type, 80 + Math.random() * 60);
      }
    }
    setTimeout(type, 2200);

    // ── 粒子生成 ──
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      if (Math.random() > 0.5) {
        p.style.background = 'var(--accent2)';
      }
      particlesContainer.appendChild(p);
    }

    // ── 鼠标跟随 ──
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
  </script>

</body>
</html>
