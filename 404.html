<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到</title>
  <link rel="preconnect" href="https://fonts.loli.net">
  <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
  <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* 设计令牌 */
      --color-primary: #2563EB;
      --color-primary-hover: #1D4ED8;
      --color-primary-bg: #EFF6FF;
      --color-bg: #F8FAFC;
      --color-surface: #FFFFFF;
      --color-border: #E2E8F0;
      --text-main: #0F172A;
      --text-secondary: #64748B;
      --radius-sm: 6px;
      --radius-md: 10px;
      --shadow-1: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
      --shadow-2: 0 4px 6px -2px rgba(15,23,42,0.05), 0 8px 12px -2px rgba(15,23,42,0.08);
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --easing: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--color-bg);
      color: var(--text-main);
      font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: var(--space-xl);
      text-align: center;
    }

    /* Error Number */
    .error-number {
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text-secondary);
      opacity: 0.3;
      margin-bottom: var(--space-md);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeInUp 0.4s var(--easing) forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Content */
    .content {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeInUp 0.4s var(--easing) forwards 0.1s;
    }

    h1 {
      font-size: 24px;
      line-height: 1.4;
      font-weight: 600;
      margin-bottom: var(--space-sm);
      color: var(--text-main);
    }

    .message {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--space-xl);
      line-height: 1.7;
    }

    /* Action Card */
    .action-card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      box-shadow: var(--shadow-1);
      display: inline-block;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeInUp 0.4s var(--easing) forwards 0.2s;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: white;
      background: var(--color-primary);
      border: none;
      border-radius: var(--radius-sm);
      text-decoration: none;
      cursor: pointer;
      transition: all 150ms var(--easing);
      min-height: 44px;
    }

    .home-link:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 6px -4px rgba(0,0,0,0.1);
    }

    .home-link:active {
      transform: translateY(0);
    }

    .home-link svg {
      width: 18px;
      height: 18px;
    }

    /* Suggestions */
    .suggestions {
      margin-top: var(--space-xl);
      opacity: 0;
      animation: fadeInUp 0.4s var(--easing) forwards 0.3s;
    }

    .suggestions-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: var(--space-sm);
    }

    .suggestion-links {
      display: flex;
      justify-content: center;
      gap: var(--space-lg);
    }

    .suggestion-links a {
      color: var(--color-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 150ms var(--easing);
    }

    .suggestion-links a:hover {
      color: var(--color-primary-hover);
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .container {
        padding: var(--space-md);
      }

      .error-number {
        font-size: 56px;
      }

      h1 {
        font-size: 20px;
      }

      .suggestion-links {
        flex-direction: column;
        gap: var(--space-sm);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-number">404</div>
    
    <div class="content">
      <h1>页面未找到</h1>
      <p class="message">抱歉，您访问的页面不存在或已被移除。</p>
    </div>

    <div class="action-card">
      <a href="/" class="home-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        返回首页
      </a>
    </div>

    <div class="suggestions">
      <p class="suggestions-title">您可能想要</p>
      <div class="suggestion-links">
        <a href="/gh-proxy/">使用 GitHub 加速</a>
        <a href="https://github.com/hunshcn/gh-proxy">查看项目</a>
      </div>
    </div>
  </div>
</body>
</html>
