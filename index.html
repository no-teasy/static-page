<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>noteasy</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* 设计令牌 */
      --color-primary: #2563EB;
      --color-primary-hover: #1D4ED8;
      --color-primary-bg: #EFF6FF;
      --color-bg: #F8FAFC;
      --color-surface: #FFFFFF;
      --color-border: #E2E8F0;
      --text-main: #0F172A;
      --text-secondary: #64748B;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-pill: 9999px;
      --shadow-1: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
      --shadow-2: 0 4px 6px -2px rgba(15,23,42,0.05), 0 8px 12px -2px rgba(15,23,42,0.08);
      --shadow-3: 0 10px 25px -5px rgba(15,23,42,0.08), 0 20px 30px -10px rgba(15,23,42,0.1);
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;
      --easing: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--color-bg);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 var(--space-xl);
    }

    /* Header */
    .header {
      padding: var(--space-2xl) 0 var(--space-lg);
      text-align: center;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-sm);
      background: var(--color-primary-bg);
      color: var(--color-primary);
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-pill);
      margin-bottom: var(--space-md);
      letter-spacing: 0.02em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--color-primary);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    h1 {
      font-size: 28px;
      line-height: 1.3;
      font-weight: 700;
      margin-bottom: var(--space-sm);
      color: var(--text-main);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto;
    }

    /* Features Section */
    .features {
      padding: var(--space-2xl) 0;
      margin-bottom: var(--space-xl);
    }

    .features-title {
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-lg);
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      max-width: 900px;
      margin: 0 auto;
    }

    .feature-item {
      text-align: center;
      padding: var(--space-lg);
      background: var(--color-surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-1);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeInUp 0.4s var(--easing) forwards;
    }

    .feature-item:nth-child(1) { animation-delay: 0.05s; }
    .feature-item:nth-child(2) { animation-delay: 0.1s; }
    .feature-item:nth-child(3) { animation-delay: 0.15s; }

    .feature-icon {
      font-size: 28px;
      margin-bottom: var(--space-sm);
    }

    .feature-item h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: var(--space-xs);
    }

    .feature-item p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Cards */
    .cards-grid {
      display: grid;
      gap: var(--space-md);
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: var(--space-3xl);
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-decoration: none;
      color: inherit;
      transition: all 200ms var(--easing);
      box-shadow: var(--shadow-1);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeInUp 0.4s var(--easing) forwards;
    }

    .card:nth-child(1) { animation-delay: 0.2s; }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-2);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      background: var(--color-primary-bg);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 200ms var(--easing);
    }

    .card:hover .card-icon {
      background: var(--color-primary);
    }

    .card-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--color-primary);
      transition: stroke 200ms var(--easing);
    }

    .card:hover .card-icon svg {
      stroke: white;
    }

    .card-content {
      flex: 1;
    }

    .card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: var(--space-xs);
      color: var(--text-main);
    }

    .card p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .card-arrow {
      opacity: 0;
      transform: translateX(-4px);
      transition: all 200ms var(--easing);
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .card-arrow svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-secondary);
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Footer */
    .footer {
      padding: var(--space-2xl) 0;
      text-align: center;
      border-top: 1px solid var(--color-border);
      margin-top: var(--space-2xl);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: var(--space-lg);
      margin-bottom: var(--space-md);
    }

    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 150ms var(--easing);
    }

    .footer-links a:hover {
      color: var(--color-primary);
    }

    .copyright {
      font-size: 12px;
      color: var(--text-secondary);
    }

    @media (max-width: 640px) {
      .container {
        padding: 0 var(--space-md);
      }

      h1 {
        font-size: 24px;
      }

      .header {
        padding: var(--space-xl) 0 var(--space-lg);
      }

      .card {
        padding: var(--space-md);
      }

      .features-grid {
        grid-template-columns: 1fr;
        gap: var(--space-sm);
      }

      .feature-item {
        padding: var(--space-md);
      }

      .footer-links {
        flex-direction: column;
        gap: var(--space-md);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="status-badge">
        <div class="status-dot"></div>
        系统运行中
      </div>
      <h1>noteasy</h1>
      <p class="subtitle">个人作品集与技术博客</p>
    </header>

    <section class="features">
      <p class="features-title">关于本站</p>
      <div class="features-grid">
        <div class="feature-item">
          <div class="feature-icon">💻</div>
          <h4>技术分享</h4>
          <p>记录开发中的点滴心得</p>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🎨</div>
          <h4>作品展示</h4>
          <p>探索有趣的Side Project</p>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📝</div>
          <h4>持续更新</h4>
          <p>学习成长，永不止步</p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="https://github.com/">GitHub</a>
        <a href="#">博客</a>
      </div>
      <p class="copyright">© 2024 noteasy</p>
    </footer>
  </div>
</body>
</html>
