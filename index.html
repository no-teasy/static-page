<!DOCTYPE html>
<html lang="zh-CN" data-root="/">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>noteasy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #4285F4;
      --green: #34A853;
      --yellow: #FBBC05;
      --red: #EA4335;
      --bg: #FFFFFF;
      --surface: #F8F9FA;
      --border: #E8EAED;
      --text-1: #202124;
      --text-2: #5F6368;
      --text-3: #80868B;
      --radius: 12px;
      --easing: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* Nav */
    nav {
      padding: 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 22px;
      font-weight: 500;
      text-decoration: none;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }

    .brand span { color: var(--blue); }

    .nav-links { display: flex; gap: 32px; }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--blue); }

    /* Hero */
    .hero {
      padding: 100px 0 80px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 32px;
    }

    .hero-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .hero h1 {
      font-size: 52px;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .hero h1 .gradient {
      background: linear-gradient(135deg, var(--blue), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 18px;
      color: var(--text-2);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* Section */
    .section {
      padding: 64px 0;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--blue);
      margin-bottom: 32px;
    }

    /* Services */
    .service-list {
      display: flex;
      flex-direction: column;
    }

    .service-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.2s var(--easing);
    }

    .service-item:last-child {
      border-bottom: none;
    }

    .service-item:hover {
      padding-left: 8px;
    }

    .service-item:hover .service-name {
      color: var(--blue);
    }

    .service-name {
      font-size: 16px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .service-desc {
      font-size: 13px;
      color: var(--text-3);
    }

    .service-arrow {
      color: var(--text-3);
      transition: transform 0.2s var(--easing), color 0.2s;
    }

    .service-item:hover .service-arrow {
      transform: translateX(4px);
      color: var(--blue);
    }

    .service-arrow svg {
      width: 18px;
      height: 18px;
    }

    /* Links */
    .links-row {
      display: flex;
      gap: 16px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s var(--easing);
    }

    .link-btn svg {
      width: 18px;
      height: 18px;
    }

    .link-primary {
      background: var(--blue);
      color: white;
    }

    .link-primary:hover {
      background: #3367D6;
      box-shadow: 0 4px 12px rgba(66,133,244,0.3);
    }

    .link-secondary {
      background: var(--surface);
      color: var(--text-1);
      border: 1px solid var(--border);
    }

    .link-secondary:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    /* Footer */
    footer {
      padding: 48px 0;
      border-top: 1px solid var(--border);
      margin-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 13px;
      color: var(--text-3);
    }

    footer p a {
      color: var(--blue);
      text-decoration: none;
    }

    footer p a:hover {
      text-decoration: underline;
    }

    footer .socials {
      display: flex;
      gap: 16px;
    }

    footer .socials a {
      color: var(--text-3);
      transition: color 0.2s;
    }

    footer .socials a:hover { color: var(--text-1); }

    footer .socials svg {
      width: 20px;
      height: 20px;
    }

    @media (max-width: 768px) {
      .wrap { padding: 0 20px; }
      .hero h1 { font-size: 36px; }
      .hero { padding: 64px 0 48px; }
      .links-row { flex-direction: column; }
      footer { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="nav-placeholder"></div>

    <section class="hero">
      <div class="hero-badge">
        <div class="dot"></div>
        Available for collaboration
      </div>
      <h1>构建优雅的<br><span class="gradient">数字体验</span></h1>
      <p>代码是诗，逻辑是韵。保持好奇，持续构建。</p>
    </section>

    <section class="section" id="services">
      <p class="section-label">服务</p>
      <div class="service-list">
        <a href="/gh-proxy/" class="service-item">
          <div>
            <div class="service-name">GitHub 文件加速</div>
            <div class="service-desc">快速下载 GitHub release、源码包和文件</div>
          </div>
          <div class="service-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>
        </a>
      </div>
    </section>

    <section class="section" id="contact">
      <p class="section-label">联系我</p>
      <div class="links-row">
        <a href="mailto:3992412947@qq.com" class="link-btn link-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          发送邮件
        </a>
        <a href="https://github.com/no-teasy" class="link-btn link-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
          GitHub
        </a>
      </div>
    </section>

    <div id="footer-placeholder"></div>
  </div>
  <script src="/components.js"></script>
</body>
</html>
