<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>noteasy</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-primary: #4285F4;
      --color-primary-hover: #3367D6;
      --color-bg: #FFFFFF;
      --color-surface: #FFFFFF;
      --color-border: #DADCE0;
      --text-main: #202124;
      --text-secondary: #5F6368;
      --text-light: #80868B;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --radius-pill: 100px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;
      --space-4xl: 96px;
      --easing: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--color-bg);
      color: var(--text-main);
      font-family: "Google Sans", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--space-xl);
    }

    /* Navigation */
    .nav {
      padding: var(--space-lg) 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-size: 20px;
      font-weight: 500;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      gap: var(--space-xl);
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 200ms var(--easing);
      letter-spacing: 0.01em;
    }

    .nav-links a:hover {
      color: var(--color-primary);
    }

    /* Hero */
    .hero {
      padding: var(--space-4xl) 0;
      text-align: center;
    }

    .hero-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4285F4 0%, #34A853 50%, #FBBC05 75%, #EA4335 100%);
      margin: 0 auto var(--space-2xl);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      font-weight: 400;
      box-shadow: 0 4px 20px rgba(66, 133, 244, 0.3);
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: var(--space-md);
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #4285F4, #34A853, #FBBC05, #EA4335);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 20px;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--color-border);
      margin: var(--space-3xl) 0;
    }

    /* About Section */
    .section {
      padding: var(--space-3xl) 0;
    }

    .section-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-primary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-xl);
    }

    .about-content {
      font-size: 18px;
      color: var(--text-main);
      line-height: 1.8;
      max-width: 700px;
    }

    .about-content p {
      margin-bottom: var(--space-lg);
    }

    .about-highlight {
      color: var(--text-secondary);
    }

    /* Projects Grid */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-lg);
    }

    .project-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-xl);
      text-decoration: none;
      color: inherit;
      transition: all 200ms var(--easing);
    }

    .project-card:hover {
      border-color: var(--color-primary);
      box-shadow: 0 4px 12px rgba(66, 133, 244, 0.1);
      transform: translateY(-2px);
    }

    .project-icon {
      width: 48px;
      height: 48px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-md);
      font-size: 20px;
      transition: all 200ms var(--easing);
    }

    .project-card:hover .project-icon {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }

    .project-card h3 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: var(--space-sm);
      color: var(--text-main);
    }

    .project-card p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .project-tags {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-md);
      flex-wrap: wrap;
    }

    .project-tag {
      font-size: 12px;
      color: var(--color-primary);
      background: rgba(66, 133, 244, 0.08);
      padding: 2px 10px;
      border-radius: var(--radius-pill);
    }

    /* Contact Section */
    .contact-links {
      display: flex;
      gap: var(--space-md);
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 16px;
      padding: var(--space-md) var(--space-lg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      transition: all 200ms var(--easing);
    }

    .contact-link:hover {
      color: var(--color-primary);
      border-color: var(--color-primary);
      background: rgba(66, 133, 244, 0.04);
    }

    .contact-link svg {
      width: 20px;
      height: 20px;
    }

    /* Footer */
    .footer {
      padding: var(--space-3xl) 0;
      text-align: center;
      border-top: 1px solid var(--color-border);
      margin-top: var(--space-3xl);
    }

    .footer-text {
      font-size: 14px;
      color: var(--text-light);
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 var(--space-lg);
      }

      .hero {
        padding: var(--space-3xl) 0;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero-subtitle {
        font-size: 16px;
      }

      .hero-avatar {
        width: 96px;
        height: 96px;
        font-size: 36px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }

      .nav-links {
        gap: var(--space-lg);
      }

      .contact-links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="#" class="nav-logo">noteasy</a>
      <div class="nav-links">
        <a href="#about">关于</a>
        <a href="#projects">项目</a>
        <a href="#contact">联系</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-avatar">N</div>
      <h1>你好，我是 <span>noteasy</span></h1>
      <p class="hero-subtitle">热爱技术，专注于创造优雅的解决方案。在这里分享我的项目、想法与成长。</p>
    </section>

    <div class="divider"></div>

    <section class="section" id="about">
      <p class="section-title">关于我</p>
      <div class="about-content">
        <p>我是一名软件开发者，喜欢探索新技术，解决有趣的问题。</p>
        <p class="about-highlight">在这个网站上，你可以找到我的一些个人项目和技术分享。我热衷于开源文化，也乐于学习和分享。</p>
      </div>
    </section>

    <section class="section" id="projects">
      <p class="section-title">项目作品</p>
      <div class="projects-grid">
        <a href="#" class="project-card">
          <div class="project-icon">🚀</div>
          <h3>项目一</h3>
          <p>一个有趣的项目描述，展示了某些技术的应用</p>
          <div class="project-tags">
            <span class="project-tag">React</span>
            <span class="project-tag">Node.js</span>
          </div>
        </a>
        <a href="#" class="project-card">
          <div class="project-icon">⚡</div>
          <h3>项目二</h3>
          <p>另一个项目的简短描述，突出其核心特点</p>
          <div class="project-tags">
            <span class="project-tag">Python</span>
            <span class="project-tag">AI</span>
          </div>
        </a>
      </div>
    </section>

    <section class="section" id="contact">
      <p class="section-title">联系我</p>
      <div class="contact-links">
        <a href="#" class="contact-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
          GitHub
        </a>
        <a href="#" class="contact-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          邮箱
        </a>
      </div>
    </section>

    <footer class="footer">
      <p class="footer-text">© 2024 noteasy. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
