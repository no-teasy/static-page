<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #64748b;
      --text-tertiary: #94a3b8;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-bg: #eef2ff;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.03);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }

    .header {
      text-align: center;
      margin-bottom: 80px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 100px;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto;
      font-weight: 400;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      margin: 48px auto;
      border-radius: 2px;
      opacity: 0;
      transform: scaleX(0);
      animation: scaleUp 0.6s ease forwards 0.4s;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleUp {
      to { opacity: 1; transform: scaleX(1); }
    }

    .cards {
      display: grid;
      gap: 16px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .card:hover {
      border-color: var(--accent-light);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .card:hover::before {
      transform: scaleX(1);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .card:hover .card-icon {
      background: var(--accent);
    }

    .card-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--accent);
      transition: stroke 0.3s ease;
    }

    .card:hover .card-icon svg {
      stroke: white;
    }

    .card h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .card p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .card-arrow {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateY(-50%) translateX(4px);
    }

    .card-arrow svg {
      width: 100%;
      height: 100%;
      stroke: var(--text-tertiary);
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 24px;
    }

    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s ease;
      position: relative;
    }

    .footer-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.2s ease;
    }

    .footer-links a:hover {
      color: var(--accent);
    }

    .footer-links a:hover::after {
      width: 100%;
    }

    .copyright {
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }

    @media (max-width: 640px) {
      .container {
        padding: 80px 20px 60px;
      }

      .header {
        margin-bottom: 60px;
      }

      .cards {
        gap: 12px;
      }

      .card {
        padding: 20px;
      }

      .footer-links {
        flex-direction: column;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="badge">系统运行中</div>
      <h1>Welcome</h1>
      <p class="subtitle">简洁高效的工具集，助力你的开发工作流程</p>
    </header>

    <div class="divider"></div>

    <div class="cards">
      <a href="/gh-proxy/" class="card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <h3>GitHub 文件加速</h3>
        <p>快速下载 GitHub 上的 release、源码包和文件</p>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </a>
    </div>

    <footer class="footer">
      <nav class="footer-links">
        <a href="#">文档</a>
        <a href="#">GitHub</a>
        <a href="#">关于</a>
      </nav>
      <p class="copyright">© 2024 Built with simplicity</p>
    </footer>
  </main>
</body>
</html>
